services:
  - type: web
    name: rift-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: apps/api
    buildCommand: npm install && npm run build
    startCommand: node scripts/migrate.js && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: rift-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_MINI_APP_URL
        value: https://rift-marketplace.vercel.app

databases:
  - name: rift-db
    plan: free
    region: frankfurt
