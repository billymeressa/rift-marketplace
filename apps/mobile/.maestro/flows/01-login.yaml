# ── 01-login.yaml ─────────────────────────────────────────────────────────────
# Login flow: phone entry → OTP (dev code from API) → Market
# Prerequisites:
#   1. Metro running:  npx expo start --ios
#   2. API running WITHOUT Telegram bot token (dev OTP mode):
#        TELEGRAM_BOT_TOKEN="" npm run dev
# ──────────────────────────────────────────────────────────────────────────────

appId: host.exp.Exponent

---

- openLink: "exp://localhost:8081"
- extendedWaitUntil:
    visible: "Nile Xport"
    timeout: 15000

# ── If already on OTP screen, go back to phone entry ─────────────────────────
# Button accessibility text is ", Change phone number" (icon + label combined)
- tapOn:
    text: ".*Change phone number.*"
    optional: true
- waitForAnimationToEnd

# Wait for phone screen — 20s handles fresh Expo bundle load after cold start
- extendedWaitUntil:
    visible: ".*send your login code.*"
    timeout: 20000

# ── Verify login screen ───────────────────────────────────────────────────────
- assertVisible: "Nile Xport"
- assertVisible: ".*send your login code.*"

# ── Enter phone number ────────────────────────────────────────────────────────
- tapOn:
    point: "65%,55%"
- eraseText: 20
- inputText: "911234567"

# ── Tap submit button ─────────────────────────────────────────────────────────
- tapOn:
    text: ".*Sign in with Telegram.*"
- waitForAnimationToEnd

# ── OTP screen: verify it appeared ───────────────────────────────────────────
- assertVisible: "Code sent via Telegram"

# ── Read devCode from API and enter it ───────────────────────────────────────
- runScript:
    file: ../scripts/get-dev-otp.js

# Tap each OTP box explicitly before entering its digit.
# Boxes are at 66% height; x positions from Maestro hierarchy: 13,27,42,57,72,87%
- tapOn:
    point: "13%,66%"
- inputText: ${output.d1}
- tapOn:
    point: "27%,66%"
- inputText: ${output.d2}
- tapOn:
    point: "42%,66%"
- inputText: ${output.d3}
- tapOn:
    point: "57%,66%"
- inputText: ${output.d4}
- tapOn:
    point: "72%,66%"
- inputText: ${output.d5}
- tapOn:
    point: "87%,66%"
- inputText: ${output.d6}
- waitForAnimationToEnd

# ── Assert Market is visible after successful login ───────────────────────────
- extendedWaitUntil:
    visible: "Market"
    timeout: 15000
- assertVisible: "Market"
