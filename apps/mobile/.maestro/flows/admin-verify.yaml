# admin-verify.yaml — Navigate admin screens and capture screenshots
appId: host.exp.Exponent

---

- openLink: "exp://localhost:8081"
- waitForAnimationToEnd
- waitForAnimationToEnd
- takeScreenshot: 01-market

- tapOn:
    text: ".*Profile.*tab.*"
    optional: true
- waitForAnimationToEnd
- waitForAnimationToEnd
- takeScreenshot: 02-profile

# Navigate to admin via deep link
- openLink: "exp://localhost:8081/--/admin"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- takeScreenshot: 03-admin-dashboard

- openLink: "exp://localhost:8081/--/admin/orders"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- takeScreenshot: 04-admin-orders

- openLink: "exp://localhost:8081/--/admin/logistics"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- takeScreenshot: 05-admin-logistics

- openLink: "exp://localhost:8081/--/admin/verifications"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- takeScreenshot: 06-admin-verifications

- openLink: "exp://localhost:8081/--/admin/users"
- waitForAnimationToEnd
- waitForAnimationToEnd
- waitForAnimationToEnd
- takeScreenshot: 07-admin-users
